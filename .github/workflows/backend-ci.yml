name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RepairFlowA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: RepairFlowA/pom.xml

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test

      - name: Build backend package
        run: ./mvnw package -DskipTests
