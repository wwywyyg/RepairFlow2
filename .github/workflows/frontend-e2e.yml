name: Frontend E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Tests/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Tests/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Start application stack
        run: docker compose -f RepairFlowA/docker-compose.ci.yml up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become ready in time"
          docker compose -f RepairFlowA/docker-compose.ci.yml logs
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:3000; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not become ready in time"
          docker compose -f RepairFlowA/docker-compose.ci.yml logs
          exit 1

      - name: Run Playwright tests
        env:
          BASE_URL: http://127.0.0.1:3000
	  HEADLESS: true
        run: pytest Tests -v

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            Tests/playwright-report
            Tests/test-results

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose -f RepairFlowA/docker-compose.ci.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f RepairFlowA/docker-compose.ci.yml down -v
