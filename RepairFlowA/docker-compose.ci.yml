version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: pg-repairflow-ci
    environment:
      POSTGRES_USER: repairflow
      POSTGRES_PASSWORD: repairflow
      POSTGRES_DB: repairflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata-ci:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repairflow -d repairflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
    container_name: api-repairflow-ci
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/repairflow
      SPRING_DATASOURCE_USERNAME: repairflow
      SPRING_DATASOURCE_PASSWORD: repairflow
      APP_JWT_SECRET: local-dev-secret-change-me
      APP_JWT_EXP_MINUTES: "60"
      APP_UPLOAD_DIR: uploads
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ../repair-flow-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8080
        VITE_WS_URL: ws://127.0.0.1:8080/ws
    container_name: web-repairflow-ci
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata-ci: